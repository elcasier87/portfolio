<section class="about-hero">

    <div class="about-hero-content">

        <span class="about-hero-tag">
            // SOBRE MÍ
        </span>

        <h1 class="about-hero-title">
            Más que código:
            <span>
                personas, ideas<br>
                y experiencias.
            </span>
        </h1>

        <p class="about-hero-description">
            Me apasiona crear soluciones digitales útiles y bonitas,
            pero también disfrutar de la vida fuera de la pantalla.
            Esta soy yo, dentro y fuera del código.
        </p>

        <a
            class="about-hero-button"
            [routerLink]="[]"
            fragment="history"
        >
            Conóceme mejor
            <span>→</span>
        </a>

    </div>

    <div class="about-hero-image">

        <img
            class="about-hero-brush"
            src="assets/images/brush_blue.png"
            alt=""
            aria-hidden="true"
        >

        <img
            class="about-hero-photo"
            src="assets/images/imagen_casi.png"
            alt="Casimiro Aroca"
        >

    </div>

</section>
